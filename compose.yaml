x-podman:
  in_pod: false # userns_mode と --pod は共存不可のため必須

# ベースイメージ参照 & userns 設定の共通定義
x-bot-base: &bot-base
  image: vicissitude-base
  userns_mode: "keep-id:uid=1000,gid=1000"

networks:
  vicissitude-net:
    driver: bridge

volumes:
  ollama-data:
  minecraft-data:
  bot-node-modules:
  bot-dist:

services:
  # Step 1: bun install (依存が変わったときだけ実質的に仕事をする)
  installer:
    <<: *bot-base
    container_name: vicissitude-installer
    # gl@6 の ANGLE ソースが GCC 14 の <cstdint> 必須化に未対応のため強制インクルード
    # TODO: gl パッケージが GCC 14+ 対応したらこのワークアラウンドを削除する
    environment:
      CXXFLAGS: "-include cstdint"
    volumes:
      - ./package.json:/app/package.json:ro
      - ./bun.lock:/app/bun.lock:ro
      - bot-node-modules:/app/node_modules
    command: ["bun", "install", "--frozen-lockfile", "--production"]
    restart: "no"

  # Step 2: bun build (バンドル)
  builder:
    <<: *bot-base
    container_name: vicissitude-builder
    volumes:
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - bot-node-modules:/app/node_modules:ro
      - bot-dist:/app/dist
    command: ["bun", "build", "src/index.ts", "--outdir", "dist", "--target", "bun"]
    depends_on:
      installer:
        condition: service_completed_successfully
    restart: "no"

  # Step 3: 実行
  bot:
    <<: *bot-base
    container_name: vicissitude
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:9091:9091"
      - "0.0.0.0:3007:3007" # prismarine-viewer
    volumes:
      - bot-node-modules:/app/node_modules:ro
      - bot-dist:/app/dist:ro
      - ./data:/app/data:rw
      - ./context:/app/context:ro
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/run/podman/podman.sock:ro
      - ${HOME}/.local/share/opencode/auth.json:/app/.local/share/opencode/auth.json:ro
    networks:
      - vicissitude-net
    logging:
      driver: journald
      options:
        tag: vicissitude
    restart: unless-stopped
    depends_on:
      builder:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    command: ["xvfb-run", "-a", "bun", "run", "dist/index.js"]

  minecraft:
    container_name: vicissitude-minecraft
    image: docker.io/itzg/minecraft-server:java21
    environment:
      EULA: "TRUE"
      ONLINE_MODE: "FALSE"
      TYPE: "VANILLA"
      VERSION: "1.21.4"
      MEMORY: "1G"
      MAX_MEMORY: "1G"
      DIFFICULTY: "normal"
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"
    mem_limit: 2g
    cpus: 2
    volumes:
      - minecraft-data:/data
    networks:
      - vicissitude-net
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    logging:
      driver: journald
      options:
        tag: vicissitude-minecraft
    restart: unless-stopped

  ollama:
    container_name: vicissitude-ollama
    image: docker.io/ollama/ollama:latest
    entrypoint: ["/entrypoint.sh"]
    environment:
      LTM_EMBEDDING_MODEL: ${LTM_EMBEDDING_MODEL:-embeddinggemma}
    volumes:
      - ollama-data:/root/.ollama
      - ./containers/ollama/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - vicissitude-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: journald
      options:
        tag: vicissitude-ollama
    restart: unless-stopped
