name: Test Quality

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 毎週月曜 09:00 JST (月曜 00:00 UTC) にフレーク検出を実行
    - cron: "0 0 * * 1"

concurrency:
  group: test-quality-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:quality

      - name: Post summary
        if: always()
        run: |
          if [ -f artifacts/test-quality/summary.md ]; then
            cat artifacts/test-quality/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-quality
          path: artifacts/test-quality/
          retention-days: 30

  flake-detection:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect flaky tests
        run: bun run test:quality:flake

      - name: Post flake summary
        if: always()
        run: |
          if [ -f artifacts/test-quality/summary-flake.md ]; then
            cat artifacts/test-quality/summary-flake.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload flake artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-quality-flake
          path: artifacts/test-quality/
          retention-days: 30
