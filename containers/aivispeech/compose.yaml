# AivisSpeech Engine — Windows (Cyrene) の Docker Desktop で起動する
# 使い方: docker compose -f containers/aivispeech/compose.yaml up -d

volumes:
  aivispeech-data:

services:
  aivispeech-engine:
    image: ghcr.io/aivis-project/aivisspeech-engine:nvidia-latest
    container_name: aivispeech-engine
    ports:
      - "10101:10101"
    volumes:
      - aivispeech-data:/home/user/.local/share/AivisSpeech-Engine-Dev
    entrypoint:
      - /bin/bash
      - -eux
      - -c
      - |
        chown user:user /home/user/.local/share/AivisSpeech-Engine-Dev
        exec gosu user /opt/python/bin/poetry run python ./run.py --use_gpu --host 0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
